{% extends "layouts/base.html" %}
{% block content %}
    <h2>Search Results:</h2>
    <ul>
    {% for book in books %} <li>{{ book.title }} - {{ book.author }}</li>
    {% empty %}
        <li>No books found matching your search.</li> {% endfor %}
    </ul>
    <a href="{% url 'search' %}">Back to Search</a>
{% endblock content %}
